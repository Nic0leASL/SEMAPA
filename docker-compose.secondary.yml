services:
  cassandra-node2:
    image: cassandra:4.1
    container_name: cassandra-node2

    ports:
      - "9042:9042"
      - "7000:7000"
      - "7199:7199"

    environment:
      - CASSANDRA_CLUSTER_NAME=SEMAPA_CLUSTER

      # Seed = tu PC principal
      - CASSANDRA_SEEDS=100.114.64.8

      # IP REAL de la PC secundaria
      - CASSANDRA_BROADCAST_ADDRESS=100.71.121.5

      - CASSANDRA_RPC_ADDRESS=0.0.0.0
      - CASSANDRA_BROADCAST_RPC_ADDRESS=100.71.121.5

      - CASSANDRA_ENDPOINT_SNITCH=SimpleSnitch
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_NUM_TOKENS=16

    volumes:
      - cassandra_node2_data:/var/lib/cassandra

volumes:
  cassandra_node2_data: