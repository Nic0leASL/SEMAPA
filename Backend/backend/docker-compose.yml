version: '3.8'

networks:
  semapa-net:
    driver: bridge

services:
  cassandra-node1:
    image: cassandra:4.1
    container_name: cassandra-node1
    ports:
      - "9042:9042"
    networks:
      - semapa-net
    environment:
      - CASSANDRA_CLUSTER_NAME=SemapaCluster
      - CASSANDRA_ENDPOINT_SNITCH=SimpleSnitch
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_NUM_TOKENS=16
    volumes:
      - cassandra_node1_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  cassandra-node2:
    image: cassandra:4.1
    container_name: cassandra-node2
    ports:
      - "9043:9042"
    networks:
      - semapa-net
    environment:
      - CASSANDRA_CLUSTER_NAME=SemapaCluster
      - CASSANDRA_SEEDS=cassandra-node1
      - CASSANDRA_ENDPOINT_SNITCH=SimpleSnitch
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_NUM_TOKENS=16
    volumes:
      - cassandra_node2_data:/var/lib/cassandra
    depends_on:
      cassandra-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-api-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-api-1
    ports:
      - "8000:8000"
    networks:
      - semapa-net
    environment:
      - CASSANDRA_CONTACT_POINTS=cassandra-node1
      - CASSANDRA_PORT=9042
      - API_PORT=8000
      - NODE_NAME=API_Principal_Nodo1
    depends_on:
      cassandra-node1:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ../datos:/app/datos:ro

  backend-api-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-api-2
    ports:
      - "8001:8000"
    networks:
      - semapa-net
    environment:
      - CASSANDRA_CONTACT_POINTS=cassandra-node2
      - CASSANDRA_PORT=9042
      - API_PORT=8000
      - NODE_NAME=API_Secundario_Nodo2
    depends_on:
      cassandra-node2:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ../datos:/app/datos:ro

volumes:
  cassandra_node1_data:
  cassandra_node2_data:
